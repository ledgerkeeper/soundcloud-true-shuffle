name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build && pnpm run check:dist

      - name: Validate tag and package extension
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          expected_tag="v${version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${version}" >&2
            exit 1
          fi

          archive="soundcloud-true-shuffle-${expected_tag}-extension.zip"
          (
            cd dist
            zip -q -r -X "../${archive}" .
          )
          sha256sum "${archive}" > "${archive}.sha256"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${expected_tag}" >> "${GITHUB_OUTPUT}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.package.outputs.tag }}
          VERSION: ${{ steps.package.outputs.version }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
        run: |
          set -euo pipefail

          notes="$(cat <<'EOF'
          ## How to Install (Chromium)

          1. Download the `soundcloud-true-shuffle-*-extension.zip` file below and extract it to a folder.
          2. Open `chrome://extensions/` or your browser's extensions page.
          3. Enable **Developer mode**.
          4. Click **Load unpacked** and select the extracted folder.
          5. Enjoy!
          EOF
          )"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" \
              "${ARCHIVE}#Chromium extension archive" \
              "${ARCHIVE}.sha256#SHA-256 checksum" \
              --clobber
          else
            prerelease_flag=()
            if [[ "${VERSION}" == *-* ]]; then
              prerelease_flag+=(--prerelease)
            fi

            gh release create "${TAG}" \
              "${ARCHIVE}#Chromium extension archive" \
              "${ARCHIVE}.sha256#SHA-256 checksum" \
              --verify-tag \
              --title "SoundCloud True Shuffle Extension ${TAG}" \
              --generate-notes \
              --notes "${notes}" \
              "${prerelease_flag[@]}"
          fi
